<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WePlay</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://api.lovense-api.com/basic-sdk/core.min.js"></script>
    <script type="module" src="/src/main.js"></script>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #14b8a6;
        --accent-2: #0f766e;
        --danger: #ef4444;
        --border: #334155;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
        color: var(--text);
      }
      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero { margin-bottom: 24px; }
      .hero h1 { margin: 0 0 8px; font-size: 2rem; }
      .hero p { margin: 0; color: var(--muted); max-width: 700px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
      }
      .card {
        background: rgba(17,24,39,.92);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
      }
      .card h2 { margin-top: 0; font-size: 1.1rem; }
      .muted { color: var(--muted); }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: .95rem;
        margin-bottom: 12px;
      }
      .dot { width: 10px; height: 10px; border-radius: 999px; background: var(--danger); }
      .dot.ok { background: #22c55e; }
      .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
      button { border: none; border-radius: 10px; padding: 12px 16px; font-weight: 600; cursor: pointer; }
      .primary { background: var(--accent); color: #042f2e; }
      .secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
      .danger { background: #7f1d1d; color: #fecaca; }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #020617;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        color: #cbd5e1;
        min-height: 60px;
        margin-top: 14px;
      }
      #qrcode {
        min-height: 120px;
        display: grid;
        place-items: center;
        background: #020617;
        border-radius: 12px;
        border: 1px dashed var(--border);
        color: var(--muted);
        margin-top: 14px;
        padding: 16px;
        text-align: center;
      }
      video { max-width: 100%; border-radius: 8px; margin-top: 12px; }
      .queue-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: var(--panel-2);
        border-radius: 8px;
        margin-bottom: 6px;
      }
      .queue-item .url {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.85rem;
        color: var(--muted);
        margin-right: 8px;
      }
      .queue-item .btn-group {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .queue-item button {
        padding: 6px 10px;
        font-size: 0.8rem;
      }
      #queue-list {
        max-height: 200px;
        overflow-y: auto;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="hero">
        <h1>WePlay</h1>
        <p>
          Group media viewing with Lovense toy sync, chat, and remote control.
        </p>
      </section>

      <div class="grid">
        <section class="card">
          <h2>1. Pair toys</h2>
          <div class="controls">
            <button class="primary" id="init-sdk">Init SDK</button>
            <span id="pair-status" class="muted" style="line-height:2.5;">Not paired</span>
          </div>
          <div id="qrcode">Click "Init SDK" to pair your Lovense toys.</div>
        </section>

        <section class="card">
          <h2>2. Media player</h2>
          <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input id="media-url" type="text" placeholder="Paste a video URL (mp4, webm, etc.)" style="flex:1; background:#1f2937; color:var(--text); border:1px solid #444; border-radius:8px; padding:10px;">
            <button class="primary" id="add-to-queue">Add</button>
          </div>
          <video id="video-player" controls style="display:none;"></video>
          <div id="queue-list"></div>
          <div class="controls">
            <button class="danger" id="skip-video" style="display:none;">Skip</button>
            <button class="primary" id="request-control">Request Control</button>
          </div>
        </section>

        <section class="card">
          <h2>3. Chat</h2>
          <div id="chat" style="height:200px; overflow-y:auto; border:1px solid #444; padding:8px; border-radius:8px; background:#020617;">
            <div id="chat-messages"></div>
          </div>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <textarea id="chat-input" rows="2" style="flex:1; background:#1f2937; color:var(--text); border:1px solid #444; border-radius:8px; padding:8px;"></textarea>
            <button class="primary" id="send-chat" style="align-self:flex-end;">Send</button>
          </div>
        </section>

        <section class="card">
          <h2>4. Toy control</h2>
          <p class="muted">Sliders like the Lovense Remote app.</p>
          <div style="display:flex; flex-direction:column; gap:8px; margin-top:12px;">
            <label>Vibrate: <span id="vibrate-value">0</span> <input type="range" id="vibrate-range" min="0" max="20" value="0"></label>
            <label>Rotate: <span id="rotate-value">0</span> <input type="range" id="rotate-range" min="0" max="20" value="0"></label>
            <label>Pump: <span id="pump-value">0</span> <input type="range" id="pump-range" min="0" max="3" value="0"></label>
            <div style="display:flex; gap:12px; margin-top:4px;">
              <button class="primary" id="send-toy">Send command</button>
              <button class="danger" id="stop-toy">Stop</button>
            </div>
          </div>
          <pre id="command-output">No command sent yet.</pre>
        </section>
      </div>
    </div>
  </body>
</html>
