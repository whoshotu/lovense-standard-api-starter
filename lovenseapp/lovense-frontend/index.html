<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WePlay</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://api.lovense-api.com/basic-sdk/core.min.js"></script>
    <script src="https://cdn.lovense-api.com/peditor-v2/pattern-sdk.js"></script>
    <script type="module" src="/src/main.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0b0e1a;
        --surface: #131724;
        --surface-2: #1c2135;
        --text: #f0f2f8;
        --muted: #8b91a8;
        --accent: #b44aff;
        --accent-hover: #9f3ee6;
        --green: #22c55e;
        --red: #ef4444;
        --border: #252b42;
        --radius: 12px;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      #age-gate {
        position: fixed; inset: 0; background: var(--bg);
        display: flex; align-items: center; justify-content: center; z-index: 9999;
      }
      #age-gate .box {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 24px; padding: 56px 48px; text-align: center;
        max-width: 420px; width: 90%;
      }
      #age-gate h2 { margin: 16px 0 8px; font-size: 1.6rem; }
      #age-gate .sub { color: var(--muted); margin-bottom: 32px; }
      #age-gate .btns { display: flex; gap: 14px; justify-content: center; }
      #age-gate .btns button {
        min-width: 110px; padding: 14px 28px; font-size: 1.1rem;
        border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600;
      }
      #age-gate .btns .yes { background: var(--accent); color: #fff; }
      #age-gate .btns .no { background: #2a1f1f; color: var(--red); border: 1px solid var(--red); }
      .age-banner { margin-bottom: 16px; }
      .age-banner img { max-width: 100%; height: auto; border-radius: 8px; }
      .app { display: none; }
      .app.show { display: block; }

      .header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
      }
      .header .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
      .header .logo span { color: var(--accent); }
      .header .center { display: flex; align-items: center; gap: 10px; }
      .header .center .room-badge {
        display: flex; align-items: center; gap: 6px;
        background: var(--surface-2); border: 1px solid var(--border);
        padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
        cursor: default; color: var(--muted);
      }
      .header .center .room-badge .name { color: var(--text); font-weight: 600; }
      .header .actions { display: flex; gap: 8px; align-items: center; }
      .header .actions button {
        padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border);
        background: var(--surface-2); color: var(--text); cursor: pointer;
        font-weight: 600; font-size: 0.8rem; white-space: nowrap;
      }
      .header .actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
      .header .pair-status {
        font-size: 0.8rem; color: var(--muted);
        display: flex; align-items: center; gap: 4px;
      }
      .header .pair-status .dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--red); display: inline-block;
      }
      .header .pair-status .dot.online { background: var(--green); }

      /* Session Overlay */
      #session-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.7);
        display: none; align-items: center; justify-content: center; z-index: 100;
      }
      #session-overlay.show { display: flex; }
      #session-overlay .modal {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 24px; padding: 40px 36px; max-width: 400px;
        width: 90%; text-align: center;
      }
      #session-overlay .modal h3 { margin-bottom: 6px; }
      #session-overlay .modal .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
      #session-overlay .modal .input-group { display: flex; gap: 8px; margin-bottom: 16px; }
      #session-overlay .modal input {
        flex: 1; padding: 10px 14px; border-radius: var(--radius);
        border: 1px solid var(--border); background: var(--surface-2);
        color: var(--text); font-size: 0.95rem;
      }
      #session-overlay .modal .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      #session-overlay .modal .btns button {
        padding: 10px 24px; border: none; border-radius: var(--radius);
        cursor: pointer; font-weight: 600;
      }
      #session-overlay .modal .btns .primary { background: var(--accent); color: #fff; }
      #session-overlay .modal .btns .secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
      #session-overlay .modal .btns .close-btn { background: transparent; color: var(--muted); }
      #session-overlay .modal .invite-display {
        background: var(--surface-2); padding: 10px; border-radius: 8px;
        font-size: 1.2rem; font-weight: 700; letter-spacing: 2px;
        margin: 12px 0; border: 1px solid var(--border);
      }

      .main-layout {
        display: flex; gap: 0; height: calc(100vh - 60px);
      }
      .media-area {
        flex: 1; display: flex; flex-direction: column;
        padding: 14px 18px; min-width: 0;
      }
      .queue-bar {
        display: flex; gap: 8px; overflow-x: auto;
        padding-bottom: 10px; margin-bottom: 10px; flex-shrink: 0;
      }
      .queue-bar .q-item {
        flex-shrink: 0; padding: 5px 12px; border-radius: 16px;
        background: var(--surface-2); border: 1px solid var(--border);
        cursor: pointer; font-size: 0.78rem; display: flex;
        align-items: center; gap: 5px; white-space: nowrap; max-width: 180px;
        overflow: hidden;
      }
      .queue-bar .q-item span {
        overflow: hidden; text-overflow: ellipsis;
      }
      .queue-bar .q-item.active { border-color: var(--accent); background: rgba(180,74,255,0.15); }
      .queue-bar .q-item .remove {
        color: var(--red); cursor: pointer; font-size: 0.9rem;
        font-weight: 700; background: none; border: none; padding: 0 2px;
      }
      .video-container {
        flex: 1; background: #000; border-radius: var(--radius);
        overflow: hidden; display: flex; align-items: center;
        justify-content: center; position: relative; min-height: 0;
      }
      .video-container video,
      .video-container iframe {
        width: 100%; height: 100%; border: none;
      }
      .video-container .placeholder { color: var(--muted); text-align: center; padding: 20px; }
      .video-container .placeholder .icon { font-size: 2.5rem; margin-bottom: 6px; }
      .ad-space {
        display: flex; gap: 8px; justify-content: center;
        padding: 6px 0; flex-shrink: 0; flex-wrap: wrap;
      }
      .ad-space a { display: block; line-height: 0; }
      .ad-space img { max-width: 100%; height: auto; border-radius: 6px; }
      .video-controls {
        display: flex; align-items: center; gap: 12px;
        padding: 8px 0; flex-shrink: 0;
      }
      .video-controls #play-btn {
        width: 36px; height: 36px; border-radius: 50%;
        border: none; background: var(--accent); color: #fff;
        font-size: 1rem; cursor: pointer; display: flex;
        align-items: center; justify-content: center;
      }
      .video-controls #play-btn:hover { background: var(--accent-hover); }
      .video-controls .vol-wrap {
        display: flex; align-items: center; gap: 6px; flex: 1;
      }
      .video-controls .vol-wrap .vol-icon { color: var(--muted); font-size: 0.85rem; }
      .video-controls .vol-wrap input[type="range"] {
        flex: 1; max-width: 140px; accent-color: var(--accent);
      }

      .sidebar {
        width: 330px; flex-shrink: 0; display: flex; flex-direction: column;
        border-left: 1px solid var(--border); background: var(--surface);
      }
      .sidebar .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
      .sidebar .tab-bar button {
        flex: 1; padding: 10px; border: none; background: transparent;
        color: var(--muted); cursor: pointer; font-weight: 600;
        font-size: 0.82rem; transition: 0.2s;
      }
      .sidebar .tab-bar button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
      .sidebar .tab-content { flex: 1; overflow-y: auto; padding: 10px 12px; }
      .sidebar .tab-content.hidden { display: none; }

      /* Browse */
      .filter-bar {
        display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;
      }
      .filter-bar select, .filter-bar input {
        padding: 5px 8px; border-radius: 8px;
        border: 1px solid var(--border); background: var(--surface-2);
        color: var(--text); font-size: 0.78rem; flex: 1; min-width: 0;
      }
      .filter-bar select option { background: var(--surface-2); }
      #browse-search { width: 100%; margin-bottom: 8px; }
      .video-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      }
      .video-grid .vitem {
        border-radius: 8px; overflow: hidden; cursor: pointer;
        background: var(--surface-2); border: 1px solid var(--border); transition: 0.2s;
      }
      .video-grid .vitem:hover { border-color: var(--accent); }
      .video-grid .vitem .vinfo { padding: 6px 8px; }
      .video-grid .vitem .vinfo .vtitle {
        font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .video-grid .vitem .vinfo .vmeta {
        font-size: 0.68rem; color: var(--muted); margin-top: 3px;
      }
      .video-grid .vitem:hover { border-color: var(--accent); }
      .vthumb { position: relative; }
      .vthumb img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
      .vthumbs-hover {
        display: none; position: absolute; top: 0; left: 0; width: 100%;
        grid-template-columns: 1fr 1fr 1fr; gap: 1px; pointer-events: none;
      }
      .vitem:hover .vthumbs-hover { display: grid; }
      .vthumbs-hover img { aspect-ratio: 16/9; object-fit: cover; opacity: 0.85; }
      .video-grid .vitem .vinfo { padding: 5px 7px; }
      .video-grid .vitem .vinfo .vtitle {
        font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .video-grid .vitem .vinfo .vmeta {
        font-size: 0.68rem; color: var(--muted); margin-top: 2px;
      }
      #browse-loading { text-align: center; color: var(--muted); padding: 16px; font-size: 0.85rem; }

      /* Chat */
      #chat-messages { min-height: 80px; }
      #chat-messages .msg { margin-bottom: 6px; font-size: 0.85rem; }
      #chat-messages .msg .user { color: var(--accent); font-weight: 600; }
      #chat-messages .msg .time { color: var(--muted); font-size: 0.72rem; margin-left: 4px; }
      .chat-input-area {
        display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--border);
      }
      .chat-input-area textarea {
        flex: 1; padding: 6px 8px; border-radius: 8px;
        border: 1px solid var(--border); background: var(--surface-2);
        color: var(--text); resize: none; font-size: 0.85rem;
      }
      .chat-input-area button {
        padding: 6px 12px; border: none; border-radius: 8px;
        background: var(--accent); color: #fff; cursor: pointer; align-self: flex-end;
      }

      /* Control */
      .control-section { margin-bottom: 14px; }
      .control-section label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; }
      .control-section select {
        width: 100%; padding: 7px 10px; border-radius: 8px;
        border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
      }
      .control-section select option { background: var(--surface-2); }
      .control-status {
        font-size: 0.82rem; padding: 7px; border-radius: 8px;
        background: var(--surface-2); margin: 8px 0; text-align: center;
      }
      .control-status .highlight { color: var(--accent); font-weight: 600; }
      .control-btns { display: flex; gap: 6px; margin-top: 6px; }
      .control-btns button {
        flex: 1; padding: 7px; border-radius: 8px; border: none;
        cursor: pointer; font-weight: 600; font-size: 0.82rem;
      }
      .control-btns .primary { background: var(--accent); color: #fff; }
      .control-btns .secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }

      /* Toy controls */
      .toy-controls { padding: 6px 0; }
      .toy-controls label {
        display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.85rem;
      }
      .toy-controls label .val { min-width: 24px; text-align: center; color: var(--accent); font-weight: 600; }
      .toy-controls input[type="range"] { flex: 1; accent-color: var(--accent); }
      .toy-btns { display: flex; gap: 8px; margin-top: 4px; }
      .toy-btns button { flex: 1; padding: 8px; border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer; font-size: 0.82rem; }
      .toy-btns .send { background: var(--accent); color: #fff; }
      .toy-btns .stop { background: transparent; color: var(--red); border: 1px solid var(--red); }

      @media (max-width: 768px) {
        .main-layout { flex-direction: column; height: auto; }
        .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); }
        .sidebar .tab-content { max-height: 280px; }
      }
    </style>
  </head>
  <body>
    <div id="age-gate">
      <div class="box">
        <div class="age-banner">
          <a href="https://www.lovense.com/r/ygxzpn" target="_blank" rel="noopener">
            <img alt="" src="https://cdn.lovense.com/UploadFiles/web/affiliate/20220406/d7cf463c8ef14e01aa87ce12250b0809.png" loading="lazy">
          </a>
        </div>
        <div style="font-size:3rem;">🔞</div>
        <h2>Are you 18 or older?</h2>
        <p class="sub">This content is intended for adults only.</p>
        <div class="btns">
          <button class="yes" id="age-yes">Yes</button>
          <button class="no" id="age-no">No</button>
        </div>
      </div>
    </div>

    <div class="app" id="app">
      <header class="header">
        <div class="logo">We<span>Play</span></div>
        <div class="center">
          <div class="room-badge" id="room-badge">
            <span>🌐</span>
            <span class="name" id="room-name">Community</span>
          </div>
        </div>
        <div class="actions">
          <button id="create-private-btn">+ Create Private</button>
          <button id="leave-room-btn" style="display:none;">↩ Community</button>
          <span class="pair-status">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">—</span>
          </span>
          <button id="init-sdk" style="padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-2);color:var(--text);cursor:pointer;font-weight:600;font-size:0.8rem;">Pair Toy</button>
        </div>
      </header>

      <!-- Session Overlay -->
      <div id="session-overlay">
        <div class="modal">
          <h3 id="overlay-title">Private Session</h3>
          <p class="sub" id="overlay-sub">Create a private room or join one</p>
          <div id="overlay-invite" style="display:none;">
            <p style="font-size:0.85rem;color:var(--muted);margin-bottom:6px;">Share this code with your partner:</p>
            <div class="invite-display" id="invite-code-display">—</div>
            <button class="primary" id="copy-invite-btn" style="padding:8px 20px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer;font-weight:600;margin-bottom:12px;">Copy Code</button>
          </div>
          <div id="overlay-join">
            <div class="input-group">
              <input id="room-code-input" type="text" placeholder="Enter invite code...">
              <button class="secondary" id="join-room-btn">Join</button>
            </div>
          </div>
          <div id="overlay-error" style="color:var(--red);font-size:0.85rem;margin-bottom:10px;"></div>
          <div class="btns">
            <button class="primary" id="create-room-btn">Create Room</button>
            <button class="close-btn" id="close-overlay">Cancel</button>
          </div>
        </div>
      </div>

      <div class="main-layout" id="main-layout">
        <div class="media-area">
          <div class="queue-bar" id="queue-bar"></div>
          <div class="video-container" id="video-container">
            <div class="placeholder" id="placeholder">
              <div class="icon">🎬</div>
              <div>No videos in queue — add from Browse</div>
            </div>
            <video id="video-player" playsinline style="display:none;"></video>
            <iframe id="yt-player" style="display:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            <video id="preload-player" preload="auto" style="display:none;"></video>
          </div>
          <div class="ad-space">
            <a href="https://www.lovense.com/r/e9picp" target="_blank" rel="noopener">
              <img width="720" height="90" alt="" src="https://cdn.lovense.com/UploadFiles/web/affiliate/20220406/51fc5b97b68a405a888be4dc5efa100d.png" loading="lazy">
            </a>
            <a href="https://www.lovense.com/r/u1xc0v" target="_blank" rel="noopener">
              <img width="720" height="90" alt="" src="https://cdn.lovense.com/UploadFiles/web/affiliate/20220406/d7cf463c8ef14e01aa87ce12250b0809.png" loading="lazy">
            </a>
          </div>
          <div class="video-controls">
            <button id="play-btn">▶</button>
            <div class="vol-wrap">
              <span class="vol-icon">🔊</span>
              <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
            </div>
            <div id="sync-btn-container"></div>
          </div>
        </div>

        <div class="sidebar">
          <div class="tab-bar">
            <button class="active" data-tab="chat">Chat</button>
            <button data-tab="toys">Toys</button>
            <button data-tab="browse">Browse</button>
          </div>
          <div class="tab-content" id="tab-chat">
            <div id="chat-messages"></div>
          </div>
          <div class="tab-content hidden" id="tab-toys">
            <div class="control-section" id="control-section">
              <label>Control Mode</label>
              <select id="control-mode-select">
                <option value="none">None (no control)</option>
                <option value="granted">Granted (request based)</option>
                <option value="mutual">Mutual (both control)</option>
                <option value="master">Master (creator controls all)</option>
              </select>
            </div>
            <div class="control-status" id="control-status">
              Mode: <span class="highlight">None</span> &middot; Controller: <span class="highlight" id="controller-display">—</span>
            </div>
            <div class="control-btns">
              <button class="primary" id="request-control">Request Control</button>
              <button class="secondary" id="release-control">Release</button>
            </div>
            <div id="toy-owner-status" style="font-size:0.78rem;color:var(--muted);margin-top:6px;"></div>
            <hr style="border-color:var(--border);margin:10px 0;">
            <div class="toy-controls">
              <label>Vibrate <span class="val" id="vibrate-value">0</span><input type="range" id="vibrate-range" min="0" max="20" value="0"></label>
              <label>Rotate <span class="val" id="rotate-value">0</span><input type="range" id="rotate-range" min="0" max="20" value="0"></label>
              <label>Pump <span class="val" id="pump-value">0</span><input type="range" id="pump-range" min="0" max="3" value="0"></label>
              <div class="toy-btns">
                <button class="send" id="send-toy">Send</button>
                <button class="stop" id="stop-toy">Stop</button>
              </div>
              <div id="command-output">No command sent yet.</div>
            </div>
          </div>
          <div class="tab-content hidden" id="tab-browse">
            <div class="filter-bar">
              <select id="sort-select">
                <option value="">Default</option>
                <option value="views">Most Viewed</option>
                <option value="rating">Highest Rated</option>
                <option value="duration">Duration</option>
                <option value="title">Alphabetical</option>
              </select>
              <select id="category-select">
                <option value="">All Categories</option>
              </select>
            </div>
            <input id="browse-search" type="text" placeholder="Search videos...">
            <div id="browse-loading">Loading video library...</div>
            <div class="video-grid" id="video-grid"></div>
          </div>

          <div class="chat-input-area">
            <textarea id="chat-input" rows="1" placeholder="Type a message..."></textarea>
            <button id="send-chat">Send</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
